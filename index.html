<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ma Trận Nợ">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#3b82f6">

  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2489/2489756.png">
  <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2489/2489756.png">
  
  <title>Ma Trận Nợ Nần</title>

  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    :root { --bg-outside: #f1f5f9; --bg-inside: #ffffff; --bg-input: #f8fafc; --primary: #3b82f6; --accent: #ec4899; --text: #1e293b; --border: #e2e8f0; }
    [data-theme="dark"] { --bg-outside: #020617; --bg-inside: #0a1122; --bg-input: #111a2e; --primary: #22d3ee; --accent: #d946ef; --text: #f1f5f9; --border: #1e293b; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
    body { font-family: 'Lexend', sans-serif; margin: 0; background-color: var(--bg-outside); color: var(--text); height: 100vh; overflow: hidden; }
    .app-shell { width: 100%; max-width: 500px; margin: 0 auto; background-color: var(--bg-inside); height: 100%; display: flex; flex-direction: column; }
    header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .page { flex: 1; overflow-y: auto; padding-bottom: 100px; }
    .card { background: var(--bg-inside); border-radius: 20px; padding: 20px; margin: 15px; border: 1px solid var(--border); }
    .history-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
    .nav-bottom { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: var(--bg-inside); display: flex; padding: 10px 0; border-top: 1px solid var(--border); z-index: 100; }
    .nav-item { flex: 1; text-align: center; color: #64748b; cursor: pointer; }
    .nav-item.active { color: var(--primary); font-weight: 700; }
    .hidden { display: none !important; }
    .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: 700; background: var(--primary); color: white; }
  </style>
</head>
<body>
  <div class="app-shell">
    <header><h1>Ma Trận Nợ Nần</h1></header>
    <div id="page-entry" class="page">
      <div class="card">
        <input id="purpose" placeholder="Mục chi">
        <input id="amount" type="number" placeholder="Số tiền (k)">
        <select id="payer"></select>
        <div id="participantsGroup"></div>
        <button class="btn" id="addExpenseBtn">XÁC NHẬN GIAO DỊCH</button>
      </div>
    </div>
    <div id="page-history" class="page hidden">
      <div class="card"><div id="debts"></div></div>
      <div class="card"><div id="detailsBody"></div></div>
    </div>
    <nav class="nav-bottom">
      <div class="nav-item active" id="btn-nav-entry">✏️ Nhập</div>
      <div class="nav-item" id="btn-nav-history">📊 Nợ</div>
    </nav>
  </div>

  <script>
    const firebaseConfig = { apiKey: "AIzaSyCQCqTF0PQ7FW4KE1w-u_VsyOVkBWIWy4w", authDomain: "ez-campuchia-money.firebaseapp.com", databaseURL: "https://ez-campuchia-money-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "ez-campuchia-money", storageBucket: "ez-campuchia-money.appspot.com", messagingSenderId: "718764161113", appId: "1:718764161113:web:7bcb4d86b7add1f4ced948" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Logic chính
    db.ref('expenses').on('value', s => {
      const rows = Object.entries(s.val() || {}).map(([k, v]) => ({ key: k, ...v }));
      const container = document.getElementById('detailsBody');
      container.innerHTML = rows.sort((a,b) => b.createdAt - a.createdAt).map(r => `
        <div class="history-item" onclick="showDetail('${r.purpose}', '${r.payer}', '${r.amount}', '${r.date}', '${(r.participants || []).join(', ')}')">
          <div><b>${r.purpose}</b><br><small>${r.payer} trả ${r.amount}k</small></div>
          <button onclick="event.stopPropagation(); delEx('${r.key}')" style="background:none; border:none; font-size:1.2rem">🗑️</button>
        </div>
      `).join('');
    });

    window.showDetail = (p, payer, amt, date, parts) => {
      Swal.fire({
        title: 'Chi tiết',
        html: `Mục: ${p}<br>Người trả: ${payer}<br>Tiền: ${amt}k<br>Tham gia: ${parts}`,
        confirmButtonText: 'Đóng',
        heightAuto: false, 
        returnFocus: false
      });
    };

    window.delEx = (k) => { db.ref('expenses').child(k).remove(); };
    document.getElementById('addExpenseBtn').onclick = () => { /* ... giữ logic cũ của bạn ... */ };
  </script>
</body>
</html>
