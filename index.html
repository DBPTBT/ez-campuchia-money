<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Ma Trận Nợ">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#3b82f6">

  <link rel="apple-touch-icon" sizes="180x180" href="https://cdn-icons-png.flaticon.com/512/2489/2489756.png">
  <link rel="icon" type="image/png" sizes="32x32" href="https://cdn-icons-png.flaticon.com/512/2489/2489756.png">
  
  <link rel="manifest" href="manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2489/2489756.png">
  <title>Ma Trận Nợ Nần</title>

  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <style>
    /* CSS Giữ nguyên như cũ, chỉ tối ưu thêm cho App Mode */
    :root { --bg-outside: #f1f5f9; --bg-inside: #ffffff; --bg-input: #f8fafc; --primary: #3b82f6; --accent: #ec4899; --text: #1e293b; --border: #e2e8f0; }
    [data-theme="dark"] { --bg-outside: #020617; --bg-inside: #0a1122; --bg-input: #111a2e; --primary: #22d3ee; --accent: #d946ef; --text: #f1f5f9; --border: #1e293b; }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; outline: none; }
    body { font-family: 'Lexend', sans-serif; margin: 0; background-color: var(--bg-outside); color: var(--text); display: flex; justify-content: center; overflow-x: hidden; height: 100vh; }

    .app-shell { width: 100%; max-width: 500px; background-color: var(--bg-inside); height: 100%; display: flex; flex-direction: column; position: relative; }

    header { padding: env(safe-area-inset-top) 20px 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: var(--bg-inside); z-index: 100; }
    header h1 { font-size: 1.2rem; margin: 0; background: linear-gradient(90deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }

    .theme-toggle { background: var(--bg-input); border: 1px solid var(--border); width: 40px; height: 40px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }

    .card { background: var(--bg-inside); border-radius: 20px; padding: 20px; margin: 15px; position: relative; border: 1px solid var(--border); overflow: hidden; }
    
    @keyframes rotateRGB { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    [data-theme="dark"] .card { border: none; }
    [data-theme="dark"] .card::before {
      content: ""; position: absolute; inset: 0; border-radius: 20px; padding: 0.8px;
      background: linear-gradient(90deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
      background-size: 200% 200%; animation: rotateRGB 4s linear infinite;
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
    }

    .section-title { font-weight: 700; margin-bottom: 15px; font-size: 0.8rem; color: var(--primary); text-transform: uppercase; letter-spacing: 0.5px; }

    input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg-input); color: var(--text); font-family: inherit; margin-bottom: 12px; font-size: 16px; }

    .checkbox-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
    .person-pill { background: var(--bg-input); padding: 12px; border-radius: 12px; display: flex; align-items: center; gap: 10px; cursor: pointer; font-size: 0.9rem; border: 1px solid var(--border); }
    .person-pill input[type="checkbox"] { width: 20px; height: 20px; margin: 0; accent-color: var(--primary); }
    .person-pill:has(input:checked) { border-color: var(--primary); background: var(--bg-inside); }

    .btn { width: 100%; padding: 16px; border-radius: 15px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; font-family: inherit; }
    .btn-primary { background: linear-gradient(90deg, var(--primary), var(--accent)); color: white; }
    .btn-primary:active { transform: scale(0.96); }

    .history-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .debt-row { background: var(--bg-input); padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }

    .nav-bottom { position: fixed; bottom: 0; width: 100%; max-width: 500px; background: var(--bg-inside); display: flex; justify-content: space-around; padding: 10px 0 calc(15px + env(safe-area-inset-bottom)); border-top: 1px solid var(--border); z-index: 101; }
    .nav-item { flex: 1; text-align: center; color: #64748b; cursor: pointer; font-size: 0.75rem; }
    .nav-item.active { color: var(--primary); font-weight: 700; }
    .nav-icon { font-size: 1.4rem; display: block; margin-bottom: 4px; }

    .hidden { display: none !important; }
    .page { flex: 1; overflow-y: auto; padding-bottom: 120px; }

    .swal2-popup { border-radius: 24px !important; font-family: 'Lexend', sans-serif !important; background: var(--bg-inside) !important; color: var(--text) !important; }
  </style>
</head>
<body>

  <div class="app-shell">
    <header>
      <h1>Ma Trận Nợ Nần</h1>
      <button class="theme-toggle" id="themeToggle">☀️</button>
    </header>

    <div id="page-entry" class="page">
      <div class="card">
        <div class="section-title">💸 NHẬP KHOẢN CHI</div>
        <input id="purpose" placeholder="Mục chi (Ví dụ: Trà sữa)">
        <div style="display: flex; gap: 10px;">
          <input id="date" type="date" style="flex: 1.2;">
          <input id="amount" type="number" placeholder="Số tiền (k)" style="flex: 0.8;">
        </div>
        <label style="font-size: 0.75rem; font-weight: 700; margin-bottom: 6px; display: block; opacity: 0.7;">CHỦ NỢ</label>
        <select id="payer"></select>
        <label style="font-size: 0.75rem; font-weight: 700; margin-bottom: 10px; display: block; opacity: 0.7;">DANH SÁCH CON NỢ</label>
        <div class="checkbox-group" id="participantsGroup"></div>
        <button class="btn btn-primary" id="addExpenseBtn">XÁC NHẬN GIAO DỊCH</button>
      </div>
    </div>

    <div id="page-history" class="page hidden">
      <div class="card">
        <div class="section-title">📊 CHI TIẾT NỢ</div>
        <div id="debts"></div>
      </div>
      <div class="card">
        <div class="section-title">🕒 NHẬT KÝ CHI TIÊU</div>
        <div id="detailsBody"></div>
        <div style="text-align: center; margin-top: 25px;">
          <button id="clearBtn" style="background:none; border:none; color: #ef4444; font-size: 0.7rem; text-decoration: underline; opacity: 0.5;">Xóa sạch dữ liệu</button>
        </div>
      </div>
    </div>

    <nav class="nav-bottom">
      <div class="nav-item active" id="btn-nav-entry"><span class="nav-icon">✏️</span>Nhập liệu</div>
      <div class="nav-item" id="btn-nav-history"><span class="nav-icon">📊</span>Ma trận nợ</div>
    </nav>
  </div>

  <script>
    // --- FIREBASE (Giữ nguyên) ---
    const firebaseConfig = {
      apiKey: "AIzaSyCQCqTF0PQ7FW4KE1w-u_VsyOVkBWIWy4w",
      authDomain: "ez-campuchia-money.firebaseapp.com",
      databaseURL: "https://ez-campuchia-money-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "ez-campuchia-money",
      storageBucket: "ez-campuchia-money.appspot.com",
      messagingSenderId: "718764161113",
      appId: "1:718764161113:web:7bcb4d86b7add1f4ced948"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Custom Tooltip
    const showToast = (icon, title) => Swal.fire({ icon, title, toast: true, position: 'top', showConfirmButton: false, timer: 2000 });

    // Navigation
    const navItems = { entry: document.getElementById('btn-nav-entry'), history: document.getElementById('btn-nav-history') };
    const pages = { entry: document.getElementById('page-entry'), history: document.getElementById('page-history') };
    function switchPage(p) {
      Object.keys(pages).forEach(k => { pages[k].classList.toggle('hidden', k !== p); navItems[k].classList.toggle('active', k === p); });
    }
    navItems.entry.onclick = () => switchPage('entry');
    navItems.history.onclick = () => switchPage('history');

    // Theme
    const themeBtn = document.getElementById('themeToggle');
    function setTh(t) { document.documentElement.setAttribute('data-theme', t); themeBtn.innerHTML = t === 'dark' ? '🌙' : '☀️'; localStorage.setItem('debt_theme_final', t); }
    themeBtn.onclick = () => setTh(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    setTh(localStorage.getItem('debt_theme_final') || 'light');

    // Firebase Listeners
    let users = [];
    db.ref('users').on('value', s => {
      users = Object.entries(s.val() || {}).map(([k,v]) => v.name);
      document.getElementById('payer').innerHTML = users.map(u => `<option value="${u}">${u}</option>`).join('');
      document.getElementById('participantsGroup').innerHTML = users.map(u => `<label class="person-pill"><input type="checkbox" value="${u}"><span>${u}</span></label>`).join('');
    });

    db.ref('expenses').on('value', s => {
      const data = s.val() || {};
      const rows = Object.entries(data).map(([k, v]) => ({ key: k, ...v }));
      rows.sort((a,b) => b.createdAt - a.createdAt);

      // Thay đổi đoạn code hiển thị history trong hàm db.ref('expenses').on
document.getElementById('detailsBody').innerHTML = rows.map(r => `
  <div class="history-item clickable-item" data-info='${JSON.stringify(r)}'>
    <div style="flex: 1"><b>${r.purpose}</b><br><small style="opacity:0.6">${r.payer} trả ${r.amount}k</small></div>
    <button onclick="event.stopPropagation(); delEx('${r.key}')" style="background:none; border:none; font-size:1.1rem; cursor:pointer">🗑️</button>
  </div>
`).join('') || '<p style="text-align:center; opacity:0.5">Chưa có giao dịch</p>';

// THÊM ĐOẠN NÀY SAU KHI GỌI innerHTML (Để bắt sự kiện click chuẩn xác)
document.querySelectorAll('.clickable-item').forEach(item => {
  item.addEventListener('click', (e) => {
    // Ngăn chặn hoàn toàn việc trình duyệt tự cuộn trang
    e.preventDefault();
    const data = JSON.parse(item.getAttribute('data-info'));
    showDetail(data.purpose, data.payer, data.amount, data.date, data.participants ? data.participants.join(', ') : '');
  });
});

      let matrix = {};
      rows.forEach(r => {
        if(!r.participants) return;
        if(r.settlement) {
          const f = r.payer, t = r.participants.find(p => p !== f);
          if(f && t) { matrix[`${f}->${t}`] = (matrix[`${f}->${t}`] || 0) - Number(r.amount); matrix[`${t}->${f}`] = (matrix[`${t}->${f}`] || 0) + Number(r.amount); }
        } else {
          const share = Math.floor(Number(r.amount) / r.participants.length);
          r.participants.forEach(p => { if(p !== r.payer) { matrix[`${p}->${r.payer}`] = (matrix[`${p}->${r.payer}`] || 0) + share; matrix[`${r.payer}->${p}`] = (matrix[`${r.payer}->${p}`] || 0) - share; } });
        }
      });

      const entries = Object.entries(matrix).filter(([k, v]) => v > 0.9);
      document.getElementById('debts').innerHTML = entries.map(([key, val]) => {
        const [f, t] = key.split('->');
        return `<div class="debt-row"><span><b>${f}</b> ➔ ${t}: <b>${Math.round(val)}k</b></span>
                <button class="btn" style="width:auto; padding:8px 15px; background:#10b981; color:white; font-size:0.75rem" onclick="pay('${f}','${t}',${Math.round(val)})">Trả</button></div>`;
      }).join('') || '<p style="text-align:center; color:#10b981">Đã sạch nợ! 🎉</p>';
    });

    // Actions
    document.getElementById('addExpenseBtn').onclick = () => {
      const p = document.getElementById('purpose').value, a = document.getElementById('amount').value, payer = document.getElementById('payer').value, d = document.getElementById('date').value,
            parts = Array.from(document.querySelectorAll('#participantsGroup input:checked')).map(i => i.value);
      if(!p || !a || parts.length === 0) return showToast('warning', 'Thiếu thông tin!');
      db.ref('expenses').push({ purpose: p, amount: a, payer, date: d, participants: parts, createdAt: Date.now() });
      document.getElementById('purpose').value = ''; document.getElementById('amount').value = '';
      confetti({ particleCount: 100, spread: 70, origin: { y: 0.8 } });
      showToast('success', 'Xong!');
    };

    window.delEx = (k) => {
      Swal.fire({ title: 'Xóa?', icon: 'warning', showCancelButton: true, confirmButtonText: 'Có', cancelButtonText: 'Không' })
      .then((res) => { if(res.isConfirmed) db.ref('expenses').child(k).remove(); });
    };

    window.pay = (f, t, a) => {
      Swal.fire({ title: 'Trả nợ', text: `${f} trả ${a}k cho ${t}?`, icon: 'question', showCancelButton: true, confirmButtonText: 'Đúng' })
      .then((res) => { if(res.isConfirmed) db.ref('expenses').push({ purpose: 'Trả nợ', amount: a, payer: f, date: new Date().toISOString().slice(0,10), participants: [f, t], settlement: true, createdAt: Date.now() }); });
    };

    document.getElementById('clearBtn').onclick = () => {
      Swal.fire({ title: 'Xóa hết?', icon: 'error', showCancelButton: true, confirmButtonText: 'Xóa' })
      .then((res) => { if(res.isConfirmed) db.ref('expenses').remove(); });
    };
    document.getElementById('date').value = new Date().toISOString().slice(0,10);

window.showDetail = (purpose, payer, amount, date, participants) => {
  Swal.fire({
    title: 'Chi tiết giao dịch',
    html: `...`, // (giữ nguyên phần nội dung cũ)
    confirmButtonText: 'Đóng',
    confirmButtonColor: '#3b82f6',
    customClass: { popup: 'swal2-popup' },
    // CẤU HÌNH TỐI ƯU ĐỂ GIỮ NGUYÊN VỊ TRÍ CUỘN
    heightAuto: false, // Quan trọng: Ngăn không cho popup thay đổi chiều cao trang
    scrollbarPadding: false // Ngăn không cho trang bị thụt lề khi popup mở
  });
};
    // Tắt các tính năng ép cuộn trang
    allowOutsideClick: true,
    returnFocus: false, // Không trả focus về phần tử cũ
    
    // Khi popup vừa mở xong, ép trang cuộn về đúng vị trí cũ
    didOpen: () => {
      window.scrollTo(0, scrollPos);
    },
    // Khi popup đóng, cũng giữ nguyên vị trí
    willClose: () => {
      window.scrollTo(0, scrollPos);
    }
  });
};
  </script>
</body>
</html>
